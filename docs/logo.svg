<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Emerald-to-Cyan Gradients -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bfd93" />
      <stop offset="50%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Abstract AP Monogram (No bulky background container for clean header integration) -->
  <g filter="url(#neonGlow)">
    <!-- Stylized 'A' paths -->
    <path d="M140 380 L234 150 C242 130, 270 130, 278 150 L372 380"
          fill="none" stroke="url(#logoGrad)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Stylized 'P' paths overlapping -->
    <path d="M236 210 L300 210 C345 210, 376 180, 376 145 C376 110, 345 80, 300 80 L270 80"
          fill="none" stroke="url(#logoGrad)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 50)" />

    <!-- A smart grid node circle representing the AI core -->
    <circle cx="256" cy="270" r="20" fill="#ffffff" filter="drop-shadow(0px 0px 10px #00e5ff)" />
  </g>
</svg>
